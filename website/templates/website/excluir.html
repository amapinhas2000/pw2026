{% extends "website/modelo.html" %}

{% block titulo_pagina %}Confirmar Exclusão - Delacruz Barber{% endblock %}

{% block conteudo %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card glass-card p-4 border-danger">
                    <div class="text-center text-danger mb-4">
                        <i class="bi bi-exclamation-triangle fs-1"></i>
                        <h1 class="h3 text-white mt-2">Confirmar Exclusão</h1>
                    </div>
                    
                    <p class="text-center text-secondary mb-4">
                        Tem certeza de que deseja excluir permanentemente: <br>
                        <strong class="text-white">"{{ object }}"</strong>?
                    </p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn btn-danger px-4 py-2">
                                Sim, Excluir
                            </button>
                            <a href="javascript:history.back()" class="btn btn-delacruz-outline px-4 py-2">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
